name: Lighthouse CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  lhci:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LHCI_PORT: "3100"
      LHCI_USE_EXISTING_SERVER: "1"
      NEXT_PUBLIC_LH_CI: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend (production)
        working-directory: frontend
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: '1'
        run: npm run build

      - name: Start frontend server (prod)
        working-directory: frontend
        run: |
          PORT="$LHCI_PORT" npm run start & echo $! > .server.pid
          npx wait-on "http://localhost:${LHCI_PORT}"

      - name: Warm pages
        run: |
          curl -sSf "http://localhost:${LHCI_PORT}/" >/dev/null
          curl -sSf "http://localhost:${LHCI_PORT}/login" >/dev/null
          curl -sSf "http://localhost:${LHCI_PORT}/lhci/instructor" >/dev/null
          curl -sSf "http://localhost:${LHCI_PORT}/instructor/availability" >/dev/null

      - name: Run Lighthouse CI (hard gate)
        working-directory: frontend
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: npx lhci autorun --config=lhci.config.js

      - name: Upload LHCI artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lhci-artifacts
          path: frontend/.lighthouseci

      - name: Stop frontend server
        if: always()
        working-directory: frontend
        run: kill "$(cat .server.pid)" || true
