name: Weekly Backup Verification

on:
  schedule:
    # Run every Sunday at 5:00 AM UTC
    - cron: '0 5 * * 0'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        # Match the pg17 backup format with an official PostgreSQL 17 + PostGIS base.
        # The repo's published CI image is still pg14, so pgvector is installed into
        # this verification container in a later step before restore.
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: instainstru_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Install dependencies
        run: |
          # Install PostgreSQL 17 client
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17 age

          echo "PostgreSQL client version:"
          pg_dump --version
          echo "Age version:"
          age --version

      - name: Install pgvector into verification container
        run: |
          echo "🧩 Installing pgvector into PostgreSQL 17 verification container..."

          CONTAINER_ID=$(docker ps --filter "publish=5432" --format '{{.ID}}' | head -n 1)
          if [ -z "$CONTAINER_ID" ]; then
            echo "::error::Could not find the PostgreSQL verification container."
            exit 1
          fi

          docker exec --user 0 "$CONTAINER_ID" bash -lc '
            set -e
            apt-get update
            apt-get install -y --no-install-recommends wget gnupg ca-certificates
            . /etc/os-release
            echo "deb http://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" > /etc/apt/sources.list.d/pgdg.list
            wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
            apt-get update
            apt-get install -y --no-install-recommends postgresql-17-pgvector
            ls -la /usr/share/postgresql/17/extension/vector*
            apt-get clean
            rm -rf /var/lib/apt/lists/*
          '

      - name: Set up extensions schema (matching Supabase layout)
        env:
          PGPASSWORD: postgres
        run: |
          echo "Creating extensions schema to match Supabase dump format..."

          psql -h localhost -p 5432 -U postgres -d instainstru_test -v ON_ERROR_STOP=1 <<'SQL'
          -- Supabase installs extensions in a dedicated 'extensions' schema.
          -- pg_dump qualifies types as extensions.geometry(), extensions.vector(), etc.
          -- We must mirror this layout for restore to succeed.
          CREATE SCHEMA IF NOT EXISTS extensions;
          SQL

          if psql -h localhost -p 5432 -U postgres -d instainstru_test -v ON_ERROR_STOP=1 \
            -c "ALTER EXTENSION postgis SET SCHEMA extensions;"; then
            echo "Moved PostGIS into extensions schema."
          else
            echo "ALTER EXTENSION postgis SET SCHEMA failed; recreating PostGIS in extensions schema..."
            psql -h localhost -p 5432 -U postgres -d instainstru_test -v ON_ERROR_STOP=1 <<'SQL'
            DROP EXTENSION IF EXISTS postgis CASCADE;
            CREATE EXTENSION IF NOT EXISTS postgis SCHEMA extensions;
            SQL
          fi

          psql -h localhost -p 5432 -U postgres -d instainstru_test -v ON_ERROR_STOP=1 <<'SQL'
          -- Install remaining extensions in the extensions schema.
          CREATE EXTENSION IF NOT EXISTS vector SCHEMA extensions;
          CREATE EXTENSION IF NOT EXISTS btree_gist SCHEMA extensions;
          CREATE EXTENSION IF NOT EXISTS pg_trgm SCHEMA extensions;
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp" SCHEMA extensions;
          CREATE EXTENSION IF NOT EXISTS fuzzystrmatch SCHEMA extensions;

          -- Set search_path so unqualified references resolve correctly.
          ALTER DATABASE instainstru_test SET search_path TO public, extensions;

          -- Verify the extension layout matches the Supabase dump expectations.
          SELECT extname, nspname
          FROM pg_extension e
          JOIN pg_namespace n ON e.extnamespace = n.oid
          WHERE extname IN ('postgis', 'vector', 'btree_gist', 'pg_trgm', 'uuid-ossp', 'fuzzystrmatch')
          ORDER BY extname;
          SQL

      - name: Download latest backup from R2
        id: download
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_READER_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_READER_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          echo "🔍 Finding latest backup..."

          # Install AWS CLI if not present
          which aws || pip install awscli

          # Find the most recent daily backup
          LATEST=$(aws s3 ls s3://${{ secrets.R2_BUCKET_NAME }}/daily/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            | grep '\.dump\.age$' | sort | tail -n 1 | awk '{print $4}')

          if [ -z "$LATEST" ]; then
            echo "::error::No backups found in R2 bucket!"
            exit 1
          fi

          echo "📦 Latest backup: $LATEST"
          echo "latest_backup=$LATEST" >> $GITHUB_OUTPUT

          # Download backup
          echo "⬇️ Downloading backup..."
          aws s3 cp s3://${{ secrets.R2_BUCKET_NAME }}/daily/$LATEST ./backup.dump.age \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

          # Download checksum
          echo "⬇️ Downloading checksum..."
          aws s3 cp s3://${{ secrets.R2_BUCKET_NAME }}/daily/${LATEST}.sha256 ./backup.dump.age.sha256 \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

          ls -lh backup.dump.age

      - name: Verify checksum
        run: |
          echo "🔢 Verifying checksum..."
          # Extract expected hash (checksum file has original filename, we renamed to backup.dump.age)
          EXPECTED=$(cat backup.dump.age.sha256 | awk '{print $1}')
          ACTUAL=$(sha256sum backup.dump.age | awk '{print $1}')

          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"

          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::❌ Checksum mismatch!"
            exit 1
          fi
          echo "✅ Checksum verified"

      - name: Verify backup freshness
        env:
          BACKUP_FILENAME: ${{ steps.download.outputs.latest_backup }}
        run: |
          echo "🕒 Verifying backup freshness..."

          BACKUP_DATE=$(printf '%s\n' "$BACKUP_FILENAME" | sed -nE 's/^backup_([0-9]{4}-[0-9]{2}-[0-9]{2})-[0-9]{6}\.dump\.age$/\1/p')

          if [ -z "$BACKUP_DATE" ]; then
            echo "::error::Could not parse backup date from filename: $BACKUP_FILENAME"
            exit 1
          fi

          NOW_TS=$(date +%s)
          BACKUP_TS=$(date -d "$BACKUP_DATE" +%s)
          DAYS_OLD=$(( (NOW_TS - BACKUP_TS) / 86400 ))

          if [ "$DAYS_OLD" -gt 2 ]; then
            echo "::error::Latest backup is ${DAYS_OLD} days old. Backup pipeline may be stalled."
            exit 1
          fi

          echo "Backup age: ${DAYS_OLD} day(s) — OK"

      - name: Decrypt backup
        run: |
          echo "🔐 Decrypting backup..."

          # Write private key to temp file
          echo "${{ secrets.AGE_PRIVATE_KEY }}" > /tmp/backup-key.txt

          # Decrypt
          age -d -i /tmp/backup-key.txt -o backup.dump backup.dump.age

          # Remove key file immediately
          rm -f /tmp/backup-key.txt

          echo "✅ Backup decrypted"
          ls -lh backup.dump

      - name: Validate backup size
        run: |
          echo "📏 Validating backup size..."

          BACKUP_FILE=backup.dump
          MIN_SIZE=1048576

          ls -la "$BACKUP_FILE"
          BACKUP_SIZE=$(stat -c%s "$BACKUP_FILE" 2>/dev/null || stat -f%z "$BACKUP_FILE")

          if [ "$BACKUP_SIZE" -lt "$MIN_SIZE" ]; then
            echo "::error::Backup file is only ${BACKUP_SIZE} bytes (minimum: ${MIN_SIZE}). Possible truncation."
            exit 1
          fi

          echo "Backup size: ${BACKUP_SIZE} bytes — OK"

      - name: Measure restore time
        id: restore
        env:
          PGPASSWORD: postgres
        run: |
          echo "🔄 Restoring backup to test database..."
          echo "⏱️ Starting timer..."

          START=$(date +%s)

          set +e
          pg_restore \
            --host=localhost \
            --port=5432 \
            --username=postgres \
            --dbname=instainstru_test \
            --clean \
            --if-exists \
            --no-owner \
            --no-acl \
            --verbose \
            backup.dump \
            > restore_stdout.log \
            2> restore_errors.log
          RESTORE_EXIT=$?
          set -e

          END=$(date +%s)
          DURATION=$((END - START))

          echo "pg_restore exit code: $RESTORE_EXIT"
          if [ -s restore_stdout.log ]; then
            cat restore_stdout.log
          fi

          if [ -s restore_errors.log ]; then
            echo "pg_restore stderr:"
            cat restore_errors.log
          fi

          : > restore_error_lines.log
          : > restore_warning_lines.log
          : > restore_fatal_lines.log

          while IFS= read -r line; do
            case "$line" in
              "pg_restore: error:"*)
                printf '%s\n' "$line" >> restore_error_lines.log
                ;;
            esac
          done < restore_errors.log

          while IFS= read -r line; do
            if printf '%s\n' "$line" | grep -Eqi \
              'role ".*" does not exist|must be owner of extension|schema ".*" already exists|extension ".*" already exists|extension "vector" is not available|could not open extension control file ".*/vector\.control"|COMMENT ON EXTENSION|type "extensions\.vector" does not exist'; then
              printf '%s\n' "$line" >> restore_warning_lines.log
            else
              printf '%s\n' "$line" >> restore_fatal_lines.log
            fi
          done < restore_error_lines.log

          if [ -s restore_warning_lines.log ]; then
            echo "Expected restore warnings (non-fatal):"
            cat restore_warning_lines.log
          fi

          if [ -s restore_fatal_lines.log ]; then
            echo "::error::Fatal restore errors detected:"
            cat restore_fatal_lines.log
            exit 1
          fi

          if [ "$RESTORE_EXIT" -ne 0 ] && [ ! -s restore_warning_lines.log ]; then
            echo "::error::pg_restore exited with status $RESTORE_EXIT and no expected warning classification matched."
            exit "$RESTORE_EXIT"
          fi

          echo "restore_seconds=$DURATION" >> $GITHUB_OUTPUT
          echo ""
          echo "✅ Restore completed in ${DURATION} seconds"
          echo "📊 This is your real RTO baseline for offsite recovery."

      - name: Verify critical tables exist
        id: tables
        env:
          PGPASSWORD: postgres
        run: |
          echo "🔍 Verifying critical tables..."

          # Use to_regclass() for robust table existence checks
          # This won't fail if a table is renamed, just reports MISSING
          RESULT=$(psql -h localhost -U postgres -d instainstru_test -t -A -c "
            SELECT json_build_object(
              'users', CASE WHEN to_regclass('public.users') IS NOT NULL THEN 'OK' ELSE 'MISSING' END,
              'instructor_services', CASE WHEN to_regclass('public.instructor_services') IS NOT NULL THEN 'OK' ELSE 'MISSING' END,
              'service_catalog', CASE WHEN to_regclass('public.service_catalog') IS NOT NULL THEN 'OK' ELSE 'MISSING' END,
              'service_categories', CASE WHEN to_regclass('public.service_categories') IS NOT NULL THEN 'OK' ELSE 'MISSING' END,
              'alembic_version', CASE WHEN to_regclass('public.alembic_version') IS NOT NULL THEN 'OK' ELSE 'MISSING' END
            );
          ")

          echo "Table verification results:"
          echo "$RESULT" | jq .

          # Check for any MISSING tables
          if echo "$RESULT" | grep -q "MISSING"; then
            echo "::error::Some expected tables are missing after restore!"
            exit 1
          else
            echo "✅ All critical tables present"
          fi

      - name: Verify row counts
        env:
          PGPASSWORD: postgres
        run: |
          echo "📊 Checking row counts..."

          TABLES_TO_CHECK="users instructor_services service_catalog service_categories"
          for TABLE in $TABLES_TO_CHECK; do
            COUNT=$(psql -h localhost -U postgres -d instainstru_test -t -A -c "SELECT COUNT(*) FROM ${TABLE};")
            COUNT=$(printf '%s' "$COUNT" | tr -d '[:space:]')

            if ! printf '%s\n' "$COUNT" | grep -Eq '^[0-9]+$'; then
              echo "::error::Table '${TABLE}' returned a non-numeric row count: '${COUNT}'"
              exit 1
            fi

            if [ "$COUNT" -eq 0 ]; then
              echo "::error::Table '${TABLE}' has 0 rows after restore. Backup may be incomplete."
              exit 1
            fi

            echo "Table ${TABLE}: ${COUNT} rows — OK"
          done

      - name: Verify auth schema (Supabase Auth)
        env:
          PGPASSWORD: postgres
        run: |
          echo "🔐 Checking auth schema..."

          AUTH_TABLES=$(psql -h localhost -U postgres -d instainstru_test -t -A -c "
            SELECT COUNT(*) FROM information_schema.tables
            WHERE table_schema = 'auth';
          ")

          if [ "$AUTH_TABLES" -gt 0 ]; then
            echo "✅ Auth schema present with $AUTH_TABLES tables"
          else
            echo "::warning::Auth schema has no tables (may be expected if auth not used)"
          fi

      - name: Generate verification report
        if: always()
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════"
          echo "       BACKUP VERIFICATION REPORT"
          echo "═══════════════════════════════════════════════════════"
          echo ""
          echo "📦 Backup: ${{ steps.download.outputs.latest_backup }}"
          echo "⏱️ Restore Time: ${{ steps.restore.outputs.restore_seconds }} seconds"
          echo ""
          echo "This restore time is your REAL RTO baseline."
          echo "If this exceeds 60 minutes, consider:"
          echo "  - Upgrading GitHub Actions runner"
          echo "  - Using a faster restore target"
          echo "  - Implementing incremental backups"
          echo ""
          echo "═══════════════════════════════════════════════════════"

      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up..."
          rm -f backup.dump backup.dump.age backup.dump.age.sha256 /tmp/backup-key.txt \
            restore_stdout.log restore_errors.log restore_error_lines.log \
            restore_warning_lines.log restore_fatal_lines.log
          echo "✅ Cleanup complete"

      - name: Report failure
        if: failure()
        run: |
          echo "::error::❌ Backup verification failed!"
          echo ""
          echo "This means your backup may be:"
          echo "  - Corrupted"
          echo "  - Incomplete"
          echo "  - Using wrong encryption key"
          echo ""
          echo "IMMEDIATE ACTION REQUIRED:"
          echo "  1. Check the logs above for specific errors"
          echo "  2. Manually test a backup restore"
          echo "  3. Verify R2 bucket contents"
          echo "  4. Verify AGE_PRIVATE_KEY matches AGE_PUBLIC_KEY"
